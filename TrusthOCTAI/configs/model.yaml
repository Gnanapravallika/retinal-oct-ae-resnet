# TrusthOCTAI Model Architecture Configuration

model:
  name: "TrustOCT"
  backbone: "resnet50"
  feature_module: "multiscale"
  attention: "cbam"
  dg: "mixstyle"
  head: "evidential"
  num_classes: 4
  pretrained: true

mixstyle:
  p: 0.5
  alpha: 0.1
  placement: "mid_level_x3"

evidential:
  kl_weight: 0.05
  annealing_epochs: 10
  softplus_smoothing: 1.0
