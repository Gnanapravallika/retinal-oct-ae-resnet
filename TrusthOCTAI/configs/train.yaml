# TrusthOCTAI Training Hyperparameters Configuration (3 Core Models)

training:
  epochs: 30
  lr: 0.0001
  weight_decay: 0.0001
  optimizer: "AdamW"
  scheduler: "CosineAnnealingLR"
  patience: 8
  mixed_precision: true
  seed: 42
  device: "cuda"

output:
  dir: "outputs/msf_cbam_resnet50"
  save_best_only: true
